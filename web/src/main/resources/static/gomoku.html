<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 · 休闲</title>
    <script src="app-base.js"></script>
    <script src="mini-base.js"></script>
    <style>
        :root {
            --bg0: #0f2a1c; --bg1: #1a472a; --accent: #c9a227; --card: rgba(255,252,245,0.96);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            background:
                radial-gradient(ellipse at 20% 10%, rgba(201,162,39,0.18), transparent 45%),
                linear-gradient(160deg, var(--bg0), var(--bg1) 55%, #12301f);
            color: #1b1b1b;
        }
        .header {
            background: rgba(0,0,0,0.3);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
        }
        .header h1 { font-size: 20px; color: #ffd700; }
        .header-btn {
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.28);
            color: #fff;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            text-decoration: none;
        }
        .wrap { max-width: 720px; margin: 24px auto; padding: 0 16px 40px; }
        .panel {
            background: var(--card);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            margin-bottom: 16px;
        }
        .modes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .modes button, .actions button {
            border: none;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            font-size: 14px;
            color: #fff;
        }
        .modes button:nth-child(1) { background: linear-gradient(135deg, #1f5c36, #2d8a4e); }
        .modes button:nth-child(2) { background: linear-gradient(135deg, #1565c0, #42a5f5); }
        .modes button:nth-child(3) { background: linear-gradient(135deg, #c41e2a, #e63946); }
        .status {
            text-align: center;
            margin: 12px 0;
            color: #ffd700;
            font-size: 15px;
            min-height: 22px;
        }
        .board-wrap { display: flex; justify-content: center; }
        canvas {
            background: #deb887;
            border-radius: 8px;
            box-shadow: inset 0 0 0 2px #8b6914;
            max-width: 100%;
            cursor: pointer;
            touch-action: none;
        }
        .actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 14px; }
        .actions button { background: rgba(0,0,0,0.55); min-width: 100px; }
        .actions button.danger { background: linear-gradient(135deg, #8b1e1e, #c41e2a); }
        .hint { font-size: 12px; color: #666; text-align: center; margin-top: 10px; }
        .difficulty { display: none; margin: 12px auto 0; max-width: 260px; font-size: 13px; color: #555; }
        .difficulty select { margin-left: 6px; padding: 5px 8px; border: 1px solid #bbb; border-radius: 5px; }
        @media (max-width: 560px) {
            .modes { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>五子棋</h1>
        <div>
            <span id="userDisplay" style="margin-right:10px;font-size:13px;"></span>
            <a class="header-btn" href="room.html" id="backLink">返回大厅</a>
        </div>
    </div>
    <div class="wrap">
        <div class="panel" id="modePanel">
            <div class="modes">
                <button type="button" onclick="startLocal(false)">本地双人</button>
                <button type="button" onclick="startLocal(true)">人机对战</button>
                <button type="button" onclick="startOnline()">联机匹配</button>
            </div>
            <label class="difficulty" id="difficultyBox">电脑水平
                <select id="difficulty"><option value="1">入门：偏重进攻</option><option value="2" selected>标准：攻守平衡</option><option value="3">挑战：优先封堵</option></select>
            </label>
            <p class="hint">15×15 无禁手 · 黑先 · 联机需另一位登录玩家同时匹配</p>
        </div>
        <div class="status" id="status">请选择模式</div>
        <div class="board-wrap"><canvas id="board" width="480" height="480"></canvas></div>
        <div class="actions">
            <button type="button" onclick="resignGame()" id="resignBtn" disabled>认输</button>
            <button type="button" onclick="cancelOnline()" id="cancelBtn" style="display:none;">取消匹配</button>
            <button type="button" onclick="resetToMenu()">重选模式</button>
        </div>
    </div>
<script>
(function () {
    var user = MiniGames.requireLogin();
    if (!user) return;
    document.getElementById('userDisplay').textContent = user.nickname;
    document.getElementById('backLink').href = appUrl('/room.html');

    var SIZE = 15, PAD = 24, CELL;
    var canvas = document.getElementById('board');
    var ctx = canvas.getContext('2d');
    var cells = [];
    var turn = 1;
    var finished = false;
    var mode = null; // local | ai | online
    var myColor = 1;
    var aiColor = 2;
    var aiLevel = 2; // 1 入门，2 标准，3 挑战；默认推荐标准
    var sock = null;
    var onlineSide = null;

    function resize() {
        var w = Math.min(480, window.innerWidth - 40);
        canvas.width = w;
        canvas.height = w;
        CELL = (w - PAD * 2) / (SIZE - 1);
        draw();
    }
    window.addEventListener('resize', resize);

    function emptyBoard() {
        cells = [];
        for (var y = 0; y < SIZE; y++) {
            cells[y] = [];
            for (var x = 0; x < SIZE; x++) cells[y][x] = 0;
        }
        turn = 1;
        finished = false;
    }

    function setStatus(t) { document.getElementById('status').textContent = t; }

    function draw() {
        var w = canvas.width;
        ctx.clearRect(0, 0, w, w);
        ctx.fillStyle = '#deb887';
        ctx.fillRect(0, 0, w, w);
        ctx.strokeStyle = '#5c4033';
        ctx.lineWidth = 1;
        for (var i = 0; i < SIZE; i++) {
            var p = PAD + i * CELL;
            ctx.beginPath(); ctx.moveTo(PAD, p); ctx.lineTo(PAD + (SIZE - 1) * CELL, p); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(p, PAD); ctx.lineTo(p, PAD + (SIZE - 1) * CELL); ctx.stroke();
        }
        [[3,3],[3,11],[7,7],[11,3],[11,11]].forEach(function (pt) {
            ctx.beginPath();
            ctx.arc(PAD + pt[0] * CELL, PAD + pt[1] * CELL, 3, 0, Math.PI * 2);
            ctx.fillStyle = '#5c4033';
            ctx.fill();
        });
        for (var y = 0; y < SIZE; y++) {
            for (var x = 0; x < SIZE; x++) {
                if (!cells[y] || !cells[y][x]) continue;
                var cx = PAD + x * CELL, cy = PAD + y * CELL;
                var g = ctx.createRadialGradient(cx - 4, cy - 4, 2, cx, cy, CELL * 0.42);
                if (cells[y][x] === 1) { g.addColorStop(0, '#666'); g.addColorStop(1, '#111'); }
                else { g.addColorStop(0, '#fff'); g.addColorStop(1, '#ddd'); }
                ctx.beginPath();
                ctx.arc(cx, cy, CELL * 0.42, 0, Math.PI * 2);
                ctx.fillStyle = g;
                ctx.fill();
            }
        }
    }

    function countDir(x, y, dx, dy, color) {
        var n = 0, cx = x + dx, cy = y + dy;
        while (cx >= 0 && cx < SIZE && cy >= 0 && cy < SIZE && cells[cy][cx] === color) {
            n++; cx += dx; cy += dy;
        }
        return n;
    }
    function checkWin(x, y, color) {
        return countDir(x,y,1,0,color)+countDir(x,y,-1,0,color) >= 4
            || countDir(x,y,0,1,color)+countDir(x,y,0,-1,color) >= 4
            || countDir(x,y,1,1,color)+countDir(x,y,-1,-1,color) >= 4
            || countDir(x,y,1,-1,color)+countDir(x,y,-1,1,color) >= 4;
    }

    function placeLocal(x, y) {
        if (finished || cells[y][x]) return false;
        cells[y][x] = turn;
        if (checkWin(x, y, turn)) {
            finished = true;
            setStatus((turn === 1 ? '黑棋' : '白棋') + '获胜');
            document.getElementById('resignBtn').disabled = true;
        } else {
            var full = true;
            for (var i = 0; i < SIZE && full; i++)
                for (var j = 0; j < SIZE; j++) if (!cells[i][j]) { full = false; break; }
            if (full) { finished = true; setStatus('和棋'); }
            else {
                turn = turn === 1 ? 2 : 1;
                if (mode === 'ai') setStatus(turn === myColor ? '轮到你' : '电脑思考中…');
                else setStatus(turn === 1 ? '黑棋落子' : '白棋落子');
            }
        }
        draw();
        return true;
    }

    function scorePoint(x, y, color) {
        if (cells[y][x]) return -1;
        cells[y][x] = color;
        var s = 0;
        var dirs = [[1,0],[0,1],[1,1],[1,-1]];
        dirs.forEach(function (d) {
            var n = 1 + countDir(x,y,d[0],d[1],color) + countDir(x,y,-d[0],-d[1],color);
            if (n >= 5) s += 100000;
            else if (n === 4) s += 10000;
            else if (n === 3) s += 1000;
            else if (n === 2) s += 100;
            else s += 10;
        });
        cells[y][x] = 0;
        return s;
    }

    function aiMove() {
        if (finished || mode !== 'ai' || turn !== aiColor) return;
        var best = -1, bx = 7, by = 7;
        for (var y = 0; y < SIZE; y++) {
            for (var x = 0; x < SIZE; x++) {
                if (cells[y][x]) continue;
                var ownWeight = aiLevel === 1 ? 1.05 : (aiLevel === 2 ? 1.15 : 1.25);
                var defendWeight = aiLevel === 1 ? 0.85 : (aiLevel === 2 ? 1.1 : 1.45);
                var centerWeight = aiLevel === 3 ? (7 - Math.abs(x - 7) + 7 - Math.abs(y - 7)) : 0;
                var s = scorePoint(x, y, aiColor) * ownWeight + scorePoint(x, y, myColor) * defendWeight + centerWeight;
                if (s > best) { best = s; bx = x; by = y; }
            }
        }
        placeLocal(bx, by);
    }

    function startLocal(vsAi) {
        closeSock();
        mode = vsAi ? 'ai' : 'local';
        if (vsAi) {
            aiLevel = parseInt(document.getElementById('difficulty').value, 10) || 2;
            document.getElementById('difficultyBox').style.display = 'block';
        } else {
            document.getElementById('difficultyBox').style.display = 'none';
        }
        myColor = 1; aiColor = 2;
        onlineSide = null;
        emptyBoard();
        draw();
        document.getElementById('resignBtn').disabled = false;
        document.getElementById('cancelBtn').style.display = 'none';
        setStatus(vsAi ? '你执黑，请落子' : '黑棋先手');
    }

    function startOnline() {
        emptyBoard(); draw();
        mode = 'online';
        finished = true;
        document.getElementById('resignBtn').disabled = true;
        document.getElementById('cancelBtn').style.display = 'inline-block';
        setStatus('连接中…');
        closeSock();
        sock = new MiniGames.MiniSocket(onSockEvent);
        sock.connect(user.sessionId).then(function () {
            setStatus('匹配中…');
            return sock.send('match', { game: 'gomoku' });
        }).then(function (msg) {
            if (msg.data && msg.data.status === 'queued') setStatus('排队等待对手…');
        }).catch(function (e) {
            setStatus(e.message || '匹配失败');
        });
    }

    function onSockEvent(msg) {
        if (!msg) return;
        if (msg.action === 'matched' && msg.data) {
            onlineSide = msg.data.side;
            myColor = onlineSide === 'black' ? 1 : 2;
            cells = msg.data.board || cells;
            turn = msg.data.turn || 1;
            finished = false;
            document.getElementById('resignBtn').disabled = false;
            document.getElementById('cancelBtn').style.display = 'none';
            setStatus('对阵 ' + (msg.data.opponent || '对手') + ' · 你执' + (myColor === 1 ? '黑' : '白')
                + (turn === myColor ? ' · 轮到你' : ' · 等待对手'));
            draw();
        } else if (msg.action === 'move' && msg.data) {
            cells[msg.data.y][msg.data.x] = msg.data.color;
            turn = msg.data.turn;
            finished = !!msg.data.finished;
            draw();
            if (!finished) setStatus(turn === myColor ? '轮到你' : '等待对手');
        } else if (msg.action === 'gameOver' && msg.data) {
            finished = true;
            document.getElementById('resignBtn').disabled = true;
            var w = msg.data.winner;
            var text = w === 0 ? '和棋' : (w === myColor ? '你赢了' : '你输了');
            setStatus(text + (msg.data.reason ? '（' + msg.data.reason + '）' : ''));
        } else if (msg.action === 'closed' && mode === 'online' && !finished) {
            setStatus('连接断开');
        }
    }

    function cancelOnline() {
        if (sock) sock.send('cancelMatch', {}).catch(function () {});
        closeSock();
        setStatus('已取消匹配');
        document.getElementById('cancelBtn').style.display = 'none';
        mode = null;
    }

    function resignGame() {
        if (finished) return;
        if (mode === 'online' && sock) {
            sock.send('resign', {}).catch(function () {});
            return;
        }
        finished = true;
        document.getElementById('resignBtn').disabled = true;
        if (mode === 'ai') setStatus('你认输，电脑获胜');
        else setStatus((turn === 1 ? '黑棋' : '白棋') + '认输，对方获胜');
    }

    function resetToMenu() {
        closeSock();
        mode = null;
        emptyBoard();
        draw();
        setStatus('请选择模式');
        document.getElementById('resignBtn').disabled = true;
        document.getElementById('cancelBtn').style.display = 'none';
        document.getElementById('difficultyBox').style.display = 'none';
    }

    function closeSock() {
        if (sock) {
            try { sock.send('leave', {}); } catch (e) {}
            sock.close();
            sock = null;
        }
    }

    canvas.addEventListener('click', function (e) {
        if (finished || !mode) return;
        var rect = canvas.getBoundingClientRect();
        var scale = canvas.width / rect.width;
        var mx = (e.clientX - rect.left) * scale;
        var my = (e.clientY - rect.top) * scale;
        var x = Math.round((mx - PAD) / CELL);
        var y = Math.round((my - PAD) / CELL);
        if (x < 0 || x >= SIZE || y < 0 || y >= SIZE) return;

        if (mode === 'online') {
            if (turn !== myColor) return;
            sock.send('move', { x: x, y: y }).catch(function (err) {
                setStatus(err.message || '落子失败');
            });
            return;
        }
        if (mode === 'ai' && turn !== myColor) return;
        if (placeLocal(x, y) && mode === 'ai' && !finished) {
            setTimeout(aiMove, 220);
        }
    });

    emptyBoard();
    resize();
    window.addEventListener('beforeunload', closeSock);
    // Inline handlers run on window; the implementations live in this IIFE.
    window.startLocal = startLocal;
    window.startOnline = startOnline;
    window.cancelOnline = cancelOnline;
    window.resignGame = resignGame;
    window.resetToMenu = resetToMenu;
})();
</script>
</body>
</html>
