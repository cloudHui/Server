<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>斗地主 - 牌桌</title>
    <link rel="stylesheet" href="../../shared/game-table.css">
    <link rel="stylesheet" href="./doudizhu.css">
    <script src="../../shared/app-base.js"></script>
    <script src="../../shared/game-table.js"></script>
</head>
<body>
<div class="table-bg">
        <!-- 顶栏 -->
        <div class="top-bar">
            <span class="room-info" id="roomInfo">牌桌加载中...</span>
            <span id="tableState"></span>
            <button class="back-btn" onclick="backToLobby()">回大厅</button>
            <button class="back-btn" onclick="exitRoom()" style="margin-left:8px;background:rgba(198,40,40,0.85);">退出房间</button>
        </div>

        <!-- WebSocket状态 -->
        <div class="ws-status" id="wsStatus">连接中...</div>

        <!-- 底牌 -->
        <div class="dizhu-cards" id="dizhuCards"></div>

        <!-- 左边玩家 -->
        <div class="player-area player-left">
            <div class="player-info" id="playerLeft">
                <span class="name">等待加入</span>
            </div>
            <div class="opponent-cards" id="cardsLeft"></div>
        </div>

        <!-- 右边玩家 -->
        <div class="player-area player-right">
            <div class="player-info" id="playerRight">
                <span class="name">等待加入</span>
            </div>
            <div class="opponent-cards" id="cardsRight"></div>
        </div>

        <!-- 出牌区域 -->
        <div class="played-cards played-left" id="playedLeft"></div>
        <div class="played-cards played-right" id="playedRight"></div>
        <div class="played-cards played-bottom" id="playedBottom"></div>

        <!-- 中央消息 -->
        <div class="center-message" id="centerMsg"></div>

        <div class="settle-overlay" id="settleOverlay">
            <div class="settle-panel">
                <h3 id="settleTitle">本局结算</h3>
                <div class="meta" id="settleMeta"></div>
                <div id="settleRows"></div>
                <div class="settle-hands" id="settleHands"></div>
                <div class="settle-countdown" id="settleCountdown"></div>
                <button onclick="closeSettle()">继续</button>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="action-bar" id="actionBar" style="display:none;"></div>

        <!-- 底部手牌 -->
        <div class="player-area player-bottom">
            <div class="player-info" id="playerBottom">
                <span class="name" id="myName">我</span>
            </div>
            <div class="my-cards" id="myCards"></div>
        </div>
    </div>

    <script src="./doudizhu.js"></script>
</body>
</html>
