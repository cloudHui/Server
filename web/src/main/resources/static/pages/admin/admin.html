<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台</title>
    <style>
        :root {
            --bg0: #101820;
            --bg1: #1c2b36;
            --accent: #c9a227;
            --card: #f7f4ee;
            --ink: #1c2430;
            --muted: #6b7280;
            --ok: #1f6b45;
            --bad: #b33a3a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            background:
                radial-gradient(ellipse at top right, rgba(201,162,39,0.12), transparent 40%),
                linear-gradient(165deg, var(--bg0), var(--bg1));
            color: var(--ink);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 28px;
            background: rgba(0,0,0,0.28);
            color: #f5f0e6;
        }
        .header h1 { font-size: 20px; color: var(--accent); letter-spacing: 0.06em; }
        .header a, .header button {
            color: #f5f0e6;
            text-decoration: none;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 7px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            margin-left: 8px;
        }
        .wrap { max-width: 1100px; margin: 20px auto; padding: 0 20px 40px; }
        .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
        .tab {
            background: rgba(255,255,255,0.08);
            color: #eee;
            border: 1px solid rgba(255,255,255,0.18);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }
        .tab.active { background: var(--accent); color: #1a1408; border-color: var(--accent); font-weight: 600; }
        .panel { display: none; }
        .panel.active { display: block; }
        .card {
            background: var(--card);
            border-radius: 14px;
            padding: 22px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.22);
        }
        .card h2 { font-size: 16px; margin-bottom: 14px; color: #243447; }
        .form-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 10px;
            align-items: end;
        }
        label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d8d2c6;
            border-radius: 8px;
            font-size: 14px;
            background: #fff;
        }
        .btn {
            border: none;
            background: #1f5c36;
            color: #fff;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }
        .btn:hover { filter: brightness(1.06); }
        .btn-ghost { background: transparent; color: #334; border: 1px solid #cfc7b8; }
        .btn-danger { background: #9e3535; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td {
            text-align: left;
            padding: 10px 8px;
            border-bottom: 1px solid #e6e0d4;
            vertical-align: middle;
        }
        th { color: var(--muted); font-weight: 600; font-size: 12px; }
        .token { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; word-break: break-all; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; }
        .badge-ok { background: #e5f5ec; color: var(--ok); }
        .badge-bad { background: #f8e8e8; color: var(--bad); }
        .actions button { margin-right: 6px; margin-top: 4px; }
        .msg { margin-top: 10px; font-size: 13px; color: var(--muted); min-height: 18px; }
        .msg.err { color: var(--bad); }
        .msg.ok { color: var(--ok); }
        .meta { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
        pre.replay {
            background: #1a222c;
            color: #e8e2d6;
            padding: 14px;
            border-radius: 10px;
            max-height: 480px;
            overflow: auto;
            font-size: 12px;
            line-height: 1.45;
            white-space: pre-wrap;
        }
        @media (max-width: 720px) {
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
    <script src="../../shared/app-base.js"></script>
</head>
<body>
    <div class="header">
        <h1>管理后台</h1>
        <div>
            <a href="../../pages/home/room.html">回大厅</a>
            <button onclick="doLogout()">退出</button>
        </div>
    </div>

    <div class="wrap">
        <div class="tabs">
            <button class="tab active" data-tab="invites" onclick="switchTab('invites')">邀请</button>
            <button class="tab" data-tab="users" onclick="switchTab('users')">玩家</button>
            <button class="tab" data-tab="tables" onclick="switchTab('tables')">桌子</button>
            <button class="tab" data-tab="records" onclick="switchTab('records')">战绩/回放</button>
        </div>

        <div id="panel-invites" class="panel active">
            <div class="card">
                <h2>创建邀请码</h2>
                <div class="form-row">
                    <div>
                        <label>备注</label>
                        <input id="note" placeholder="例如：朋友局">
                    </div>
                    <div>
                        <label>可用次数</label>
                        <input id="maxUses" type="number" min="1" value="5">
                    </div>
                    <div>
                        <label>有效天数</label>
                        <input id="expiresDays" type="number" min="0" value="7">
                    </div>
                    <button class="btn" onclick="createInvite()">创建</button>
                </div>
                <div class="msg" id="createMsg"></div>
            </div>
            <div class="card">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                    <h2 style="margin:0;">邀请列表</h2>
                    <button class="btn btn-ghost" onclick="loadInvites()">刷新</button>
                </div>
                <div style="overflow-x:auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>邀请码</th><th>备注</th><th>使用</th><th>过期</th><th>状态</th><th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="inviteBody"><tr><td colspan="6">加载中...</td></tr></tbody>
                    </table>
                </div>
                <div class="msg" id="listMsg"></div>
            </div>
        </div>

        <div id="panel-users" class="panel">
            <div class="card">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                    <h2 style="margin:0;">玩家列表</h2>
                    <button class="btn btn-ghost" onclick="loadUsers()">刷新</button>
                </div>
                <div class="meta" id="usersMeta"></div>
                <div style="overflow-x:auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th><th>用户名</th><th>昵称</th><th>在线</th><th>状态</th><th>最近登录</th><th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="userBody"><tr><td colspan="7">切换到此页后加载</td></tr></tbody>
                    </table>
                </div>
                <div class="msg" id="usersMsg"></div>
            </div>
        </div>

        <div id="panel-tables" class="panel">
            <div class="card">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                    <h2 style="margin:0;">在线桌子</h2>
                    <button class="btn btn-ghost" onclick="loadTables()">刷新</button>
                </div>
                <div class="meta" id="tablesMeta"></div>
                <div style="overflow-x:auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>桌号</th><th>模板</th><th>玩法</th><th>状态</th><th>人数</th><th>房主</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"><tr><td colspan="6">切换到此页后加载</td></tr></tbody>
                    </table>
                </div>
                <div class="msg" id="tablesMsg"></div>
            </div>
        </div>

        <div id="panel-records" class="panel">
            <div class="card">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                    <h2 style="margin:0;">战绩 / 回放记录</h2>
                    <button class="btn btn-ghost" onclick="loadReplays()">刷新</button>
                </div>
                <div class="form-row">
                    <input id="replayCode" placeholder="输入回放码，例如 2026-07-21/90001_1.txt">
                    <button class="btn btn-ghost" onclick="openReplayCode()">打开回放</button>
                    <button class="btn btn-ghost" onclick="loadReplays(1)">刷新全部</button>
                </div>
                <div class="meta">管理员列表展示全部回放并分页；回放码由日期和文件名组成。</div>
                <div style="overflow-x:auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>日期</th><th>文件</th><th>桌号</th><th>局</th><th>玩法</th><th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="replayBody"><tr><td colspan="6">切换到此页后加载</td></tr></tbody>
                    </table>
                </div>
                <div class="form-row" style="justify-content:flex-end;">
                    <button class="btn btn-ghost" onclick="loadReplays(replayPage - 1)">上一页</button>
                    <span id="replayPageLabel" class="meta"></span>
                    <button class="btn btn-ghost" onclick="loadReplays(replayPage + 1)">下一页</button>
                </div>
                <div class="msg" id="replayMsg"></div>
            </div>
            <div class="card">
                <h2>落库战绩</h2>
                <div class="meta">游戏结算后按玩家、局次和累计分数保存到 SQLite。</div>
                <div style="overflow-x:auto;"><table><thead><tr><th>桌号</th><th>局</th><th>玩家</th><th>本局</th><th>累计</th><th>结果</th></tr></thead>
                    <tbody id="recordBody"><tr><td colspan="6">切换到此页后加载</td></tr></tbody></table></div>
            </div>
            <div class="card" id="replayDetailCard" style="display:none;">
                <h2 id="replayDetailTitle">回放详情</h2>
                <pre class="replay" id="replayContent"></pre>
            </div>
        </div>
    </div>

    <script>
        var sessionId = localStorage.getItem('sessionId');
        var isAdmin = localStorage.getItem('isAdmin') === '1';
        if (!sessionId) { window.location.href = appUrl('/'); }
        if (!isAdmin) {
            alert('需要管理员账号');
            window.location.href = appUrl('/pages/home/room.html');
        }

        function switchTab(name) {
            var tabs = document.querySelectorAll('.tab');
            for (var i = 0; i < tabs.length; i++) {
                tabs[i].className = 'tab' + (tabs[i].getAttribute('data-tab') === name ? ' active' : '');
            }
            var panels = document.querySelectorAll('.panel');
            for (var j = 0; j < panels.length; j++) {
                panels[j].className = 'panel' + (panels[j].id === 'panel-' + name ? ' active' : '');
            }
            if (name === 'users') loadUsers();
            if (name === 'tables') loadTables();
            if (name === 'records') loadReplays();
        }

        function setMsg(id, text, ok) {
            var el = document.getElementById(id);
            el.textContent = text || '';
            el.className = 'msg' + (ok === true ? ' ok' : ok === false ? ' err' : '');
        }

        function createInvite() {
            var note = document.getElementById('note').value.trim();
            var maxUses = parseInt(document.getElementById('maxUses').value, 10) || 1;
            var expiresDays = parseInt(document.getElementById('expiresDays').value, 10);
            if (isNaN(expiresDays)) expiresDays = 7;
            setMsg('createMsg', '创建中...');
            fetch(appUrl('/api/admin/invites'), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    sessionId: sessionId,
                    note: note,
                    maxUses: maxUses,
                    expiresDays: expiresDays
                })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.code === 0 && data.invite) {
                    setMsg('createMsg', '已创建: ' + data.invite.token, true);
                    document.getElementById('note').value = '';
                    loadInvites();
                } else {
                    setMsg('createMsg', data.msg || '创建失败', false);
                }
            })
            .catch(function() { setMsg('createMsg', '网络错误', false); });
        }

        function loadInvites() {
            fetch(appUrl('/api/admin/invites?sessionId=' + encodeURIComponent(sessionId)))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var body = document.getElementById('inviteBody');
                    if (data.code !== 0) {
                        body.innerHTML = '<tr><td colspan="6">' + (data.msg || '加载失败') + '</td></tr>';
                        return;
                    }
                    var list = data.invites || [];
                    if (!list.length) {
                        body.innerHTML = '<tr><td colspan="6">暂无邀请码</td></tr>';
                        return;
                    }
                    var html = '';
                    for (var i = 0; i < list.length; i++) {
                        var it = list[i];
                        var exp = it.expiresAt ? new Date(it.expiresAt).toLocaleString() : '永久';
                        var st = it.valid
                            ? '<span class="badge badge-ok">可用</span>'
                            : '<span class="badge badge-bad">失效</span>';
                        html += '<tr><td class="token">' + it.token + '</td><td>' + (it.note || '') + '</td>'
                            + '<td>' + it.usedCount + '/' + it.maxUses + '</td><td>' + exp + '</td><td>' + st + '</td>'
                            + '<td class="actions"><button class="btn btn-ghost" onclick="copyInvite(\'' + it.token + '\')">复制链接</button>'
                            + (it.valid ? '<button class="btn btn-danger" onclick="revokeInvite(\'' + it.token + '\')">作废</button>' : '')
                            + '</td></tr>';
                    }
                    body.innerHTML = html;
                    setMsg('listMsg', '共 ' + list.length + ' 条', true);
                })
                .catch(function() { setMsg('listMsg', '网络错误', false); });
        }

        function copyInvite(token) {
            var url = location.origin + appUrl('/?invite=' + encodeURIComponent(token));
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(function() {
                    setMsg('listMsg', '已复制: ' + url, true);
                });
            } else {
                prompt('复制链接', url);
            }
        }

        function revokeInvite(token) {
            if (!confirm('作废邀请码 ' + token + ' ?')) return;
            fetch(appUrl('/api/admin/invites/revoke'), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId: sessionId, token: token })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.code === 0) {
                    setMsg('listMsg', '已作废', true);
                    loadInvites();
                } else {
                    setMsg('listMsg', data.msg || '失败', false);
                }
            });
        }

        function loadUsers() {
            fetch(appUrl('/api/admin/users?sessionId=' + encodeURIComponent(sessionId)))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var body = document.getElementById('userBody');
                    if (data.code !== 0) {
                        body.innerHTML = '<tr><td colspan="7">' + (data.msg || '加载失败') + '</td></tr>';
                        return;
                    }
                    document.getElementById('usersMeta').textContent = '在线 ' + (data.online || 0) + ' 人';
                    var list = data.users || [];
                    if (!list.length) {
                        body.innerHTML = '<tr><td colspan="7">暂无玩家</td></tr>';
                        return;
                    }
                    var html = '';
                    for (var i = 0; i < list.length; i++) {
                        var u = list[i];
                        var online = u.online
                            ? '<span class="badge badge-ok">在线</span>'
                            : '<span class="badge">离线</span>';
                        var en = u.enabled
                            ? '<span class="badge badge-ok">启用</span>'
                            : '<span class="badge badge-bad">禁用</span>';
                        var login = u.lastLoginAt ? new Date(u.lastLoginAt).toLocaleString() : '-';
                        html += '<tr><td>' + u.id + '</td><td>' + u.username + '</td><td>' + (u.nickname || '') + '</td>'
                            + '<td>' + online + '</td><td>' + en + '</td><td>' + login + '</td><td class="actions">'
                            + (u.username === 'admin' ? '' :
                                (u.enabled
                                    ? '<button class="btn btn-danger" onclick="setEnabled(' + u.id + ',false)">禁用</button>'
                                    : '<button class="btn" onclick="setEnabled(' + u.id + ',true)">启用</button>'))
                            + '</td></tr>';
                    }
                    body.innerHTML = html;
                    setMsg('usersMsg', '共 ' + list.length + ' 人', true);
                })
                .catch(function() { setMsg('usersMsg', '网络错误', false); });
        }

        function setEnabled(userId, enabled) {
            fetch(appUrl('/api/admin/users/enable'), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId: sessionId, userId: userId, enabled: enabled })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.code === 0) loadUsers();
                else setMsg('usersMsg', data.msg || '失败', false);
            });
        }

        function loadTables() {
            fetch(appUrl('/api/admin/tables?sessionId=' + encodeURIComponent(sessionId)))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var body = document.getElementById('tableBody');
                    if (data.code !== 0) {
                        body.innerHTML = '<tr><td colspan="6">' + (data.msg || '加载失败') + '</td></tr>';
                        return;
                    }
                    document.getElementById('tablesMeta').textContent = '在线用户 ' + (data.onlineUsers || 0);
                    var rooms = data.rooms || [];
                    var rows = [];
                    for (var i = 0; i < rooms.length; i++) {
                        var room = rooms[i];
                        var tables = room.tables || [];
                        for (var j = 0; j < tables.length; j++) {
                            var t = tables[j];
                            var gt = t.gameType === 1 ? '麻将' : (t.gameType === 2 ? '斗地主' : t.gameType);
                            rows.push('<tr><td>' + t.tableId + '</td><td>' + t.roomId + '</td><td>' + gt
                                + '</td><td>' + t.state + '</td><td>' + t.playerCount + '</td><td>'
                                + t.ownerId + '</td></tr>');
                        }
                    }
                    body.innerHTML = rows.length ? rows.join('') : '<tr><td colspan="6">暂无桌子</td></tr>';
                    setMsg('tablesMsg', '共 ' + rows.length + ' 桌', true);
                })
                .catch(function() { setMsg('tablesMsg', '网络错误', false); });
        }

        var replayPage = 1;
        function loadReplays(page) {
            replayPage = Math.max(page || 1, 1);
            fetch(appUrl('/api/admin/replays?sessionId=' + encodeURIComponent(sessionId) + '&page=' + replayPage + '&size=20'))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var body = document.getElementById('replayBody');
                    if (data.code !== 0) {
                        body.innerHTML = '<tr><td colspan="6">' + (data.msg || '加载失败') + '</td></tr>';
                        return;
                    }
                    var list = data.replays || [];
                    if (!list.length) {
                        body.innerHTML = '<tr><td colspan="6">暂无回放（对局结算后才会生成）</td></tr>';
                        setMsg('replayMsg', '0 条', true);
                        loadRecords();
                        return;
                    }
                    var html = '';
                    for (var i = 0; i < list.length; i++) {
                        var r = list[i];
                        html += '<tr><td>' + r.date + '</td><td class="token">' + r.name + '</td><td>'
                            + (r.tableId || '-') + '</td><td>' + (r.round || '-') + '</td><td>'
                            + (r.gameType || '-') + '</td><td><button class="btn btn-ghost" onclick="openReplay(\''
                            + r.date + '\',\'' + r.name + '\')">查看</button></td></tr>';
                    }
                    body.innerHTML = html;
                    document.getElementById('replayPageLabel').textContent = '第 ' + data.page + ' 页 / 共 ' + data.total + ' 条';
                    setMsg('replayMsg', '本页 ' + list.length + ' 条', true);
                    loadRecords();
                })
                .catch(function() { setMsg('replayMsg', '网络错误', false); });
        }

        function openReplayCode() {
            var code = document.getElementById('replayCode').value.trim();
            if (!code) return;
            fetch(appUrl('/api/admin/replays/code?sessionId=' + encodeURIComponent(sessionId) + '&code=' + encodeURIComponent(code)))
                .then(function(r) { return r.json(); }).then(function(data) {
                    if (data.code !== 0) { setMsg('replayMsg', data.msg || '读取失败', false); return; }
                    document.getElementById('replayDetailCard').style.display = 'block';
                    document.getElementById('replayDetailTitle').textContent = '回放 ' + data.date + '/' + data.name;
                    document.getElementById('replayContent').textContent = data.content || '';
                });
        }

        function loadRecords() {
            fetch(appUrl('/api/admin/records?sessionId=' + encodeURIComponent(sessionId) + '&page=1&size=20'))
                .then(function(r) { return r.json(); }).then(function(data) {
                    var body = document.getElementById('recordBody'), rows = data.records || [];
                    body.innerHTML = rows.length ? rows.map(function(r) {
                        return '<tr><td>' + r.tableId + '</td><td>' + r.round + '</td><td>' + r.userId
                            + '</td><td>' + r.score + '</td><td>' + r.totalScore + '</td><td>' + r.winType + '</td></tr>';
                    }).join('') : '<tr><td colspan="6">暂无落库战绩</td></tr>';
                });
        }

        function openReplay(date, name) {
            fetch(appUrl('/api/admin/replays/detail?sessionId=' + encodeURIComponent(sessionId)
                + '&date=' + encodeURIComponent(date) + '&name=' + encodeURIComponent(name)))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.code !== 0) {
                        setMsg('replayMsg', data.msg || '读取失败', false);
                        return;
                    }
                    document.getElementById('replayDetailCard').style.display = 'block';
                    document.getElementById('replayDetailTitle').textContent =
                        '回放 ' + data.date + '/' + data.name;
                    document.getElementById('replayContent').textContent = data.content || '';
                });
        }

        function doLogout() {
            localStorage.clear();
            window.location.href = appUrl('/');
        }

        loadInvites();
    </script>
</body>
</html>
