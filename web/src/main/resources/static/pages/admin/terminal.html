<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务器终端</title>
    <script src="../../shared/app-base.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            background: #0b0c0e;
            color: #d8d8d8;
            font-family: "Ubuntu Mono", "Cascadia Mono", "Consolas", "Courier New", monospace;
        }
        .screen {
            height: 100%;
            display: flex;
            flex-direction: column;
            background:
                radial-gradient(ellipse at top, rgba(40,80,40,0.08), transparent 55%),
                #0b0c0e;
        }
        .titlebar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 14px;
            background: #1a1d21;
            border-bottom: 1px solid #2a2e33;
            color: #9aa0a6;
            font-size: 12px;
            flex-shrink: 0;
        }
        .titlebar a, .titlebar button {
            color: #c8ccd0;
            background: #2a2f36;
            border: 1px solid #3a4048;
            text-decoration: none;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            margin-left: 6px;
        }
        .titlebar a:hover, .titlebar button:hover { background: #3a414a; }
        #term {
            flex: 1;
            overflow: auto;
            padding: 14px 16px 8px;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 14px;
            line-height: 1.45;
            color: #d4d4d4;
        }
        .welcome { color: #8ab4f8; }
        .prompt-line { color: #d4d4d4; }
        .prompt-user { color: #5eead4; font-weight: 600; }
        .prompt-path { color: #93c5fd; }
        .cmd-text { color: #f5f5f5; }
        .out-ok { color: #d4d4d4; }
        .out-err { color: #f87171; }
        .hint { color: #6b7280; font-size: 12px; }
        .input-row {
            display: flex;
            align-items: center;
            gap: 0;
            padding: 0 16px 14px;
            flex-shrink: 0;
            font-size: 14px;
            line-height: 1.45;
        }
        .input-row .ps1 { white-space: nowrap; }
        #cmd {
            flex: 1;
            min-width: 0;
            background: transparent;
            border: none;
            outline: none;
            color: #f5f5f5;
            font: inherit;
            caret-color: #5eead4;
            padding: 0;
        }
        #cmd:disabled { opacity: 0.55; }
    </style>
</head>
<body>
<div class="screen">
    <div class="titlebar">
        <div>ec2-user@server — bash — /home/ec2-user</div>
        <div>
            <button type="button" onclick="clearScreen()">清屏</button>
            <a href="./admin.html">管理后台</a>
            <a href="../home/room.html">回大厅</a>
        </div>
    </div>
    <div id="term"></div>
    <div class="input-row">
        <span class="ps1" id="ps1"></span>
        <input id="cmd" autocomplete="off" spellcheck="false" autofocus>
    </div>
</div>
<script>
(function () {
    var sessionId = localStorage.getItem('sessionId');
    var isAdmin = localStorage.getItem('isAdmin') === '1';
    if (!sessionId) { location.href = appUrl('/'); return; }
    if (!isAdmin) {
        alert('需要管理员账号');
        location.href = appUrl('/pages/home/room.html');
        return;
    }

    var cwd = '/home/ec2-user';
    var busy = false;
    var history = [];
    var histIdx = -1;
    var draft = '';
    var term = document.getElementById('term');
    var input = document.getElementById('cmd');
    var ps1 = document.getElementById('ps1');
    var titlebar = document.querySelector('.titlebar div');

    appendHtml('<span class="welcome">Amazon Linux / Server Admin Shell</span>\n'
        + '<span class="hint">仅管理员可用。支持常见 Linux 命令与 sudo；输入 clear / Ctrl+L 清屏。</span>\n'
        + '<span class="hint">默认目录 /home/ec2-user；交互式程序（vim/top 等）不适合此终端。</span>\n\n');
    refreshPrompt();
    bootstrapCwd();

    input.addEventListener('keydown', onKey);
    document.addEventListener('keydown', function (e) {
        if (e.ctrlKey && (e.key === 'l' || e.key === 'L')) {
            e.preventDefault();
            clearScreen();
        }
    });
    term.addEventListener('click', function () { input.focus(); });

    function bootstrapCwd() {
        fetch(appUrl('/api/admin/shell?sessionId=' + encodeURIComponent(sessionId)))
            .then(function (r) { return r.json(); })
            .then(function (d) {
                if (d.code === 0 && d.cwd) {
                    cwd = d.cwd;
                    refreshPrompt();
                }
            })
            .catch(function () {});
    }

    function refreshPrompt() {
        var short = shortenHome(cwd);
        ps1.innerHTML = '<span class="prompt-user">ec2-user@server</span>:'
            + '<span class="prompt-path">' + escapeHtml(short) + '</span>$&nbsp;';
        titlebar.textContent = 'ec2-user@server — bash — ' + cwd;
    }

    function shortenHome(path) {
        if (path === '/home/ec2-user') return '~';
        if (path.indexOf('/home/ec2-user/') === 0) return '~' + path.slice('/home/ec2-user'.length);
        return path;
    }

    function onKey(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            runCommand(input.value);
            return;
        }
        if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (!history.length) return;
            if (histIdx < 0) draft = input.value;
            histIdx = histIdx < 0 ? history.length - 1 : Math.max(0, histIdx - 1);
            input.value = history[histIdx];
            return;
        }
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (histIdx < 0) return;
            histIdx++;
            if (histIdx >= history.length) {
                histIdx = -1;
                input.value = draft;
            } else {
                input.value = history[histIdx];
            }
            return;
        }
        if (e.key === 'c' && e.ctrlKey) {
            e.preventDefault();
            if (busy) return;
            appendPromptEcho(input.value + '^C');
            input.value = '';
            histIdx = -1;
        }
    }

    function runCommand(raw) {
        if (busy) return;
        var command = raw == null ? '' : String(raw);
        appendPromptEcho(command);
        input.value = '';
        histIdx = -1;
        draft = '';
        var trimmed = command.trim();
        if (!trimmed) return;
        if (trimmed === 'clear' || trimmed === 'cls') {
            history.push(trimmed);
            clearScreen();
            return;
        }
        history.push(trimmed);
        busy = true;
        input.disabled = true;
        fetch(appUrl('/api/admin/shell'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId: sessionId, command: command })
        })
            .then(function (r) { return r.json(); })
            .then(function (d) {
                if (d.code === 403) {
                    appendHtml('<span class="out-err">' + escapeHtml(d.msg || '需要管理员账号') + '</span>\n');
                    return;
                }
                if (d.clear) {
                    clearScreen();
                    return;
                }
                if (d.cwd) cwd = d.cwd;
                var out = d.output || '';
                if (out) {
                    var cls = (d.exitCode === 0) ? 'out-ok' : 'out-err';
                    // 非零退出仍可能有正常 stdout，用红色仅强调失败感；stderr 已合并。
                    if (d.exitCode !== 0 && !/\[命令超时|执行失败|bash: cd:/.test(out)) {
                        cls = 'out-ok';
                    }
                    appendHtml('<span class="' + cls + '">' + escapeHtml(out) + '</span>');
                    if (out.charAt(out.length - 1) !== '\n') appendHtml('\n');
                }
                refreshPrompt();
            })
            .catch(function (err) {
                appendHtml('<span class="out-err">网络错误: ' + escapeHtml(String(err)) + '</span>\n');
            })
            .then(function () {
                busy = false;
                input.disabled = false;
                input.focus();
                term.scrollTop = term.scrollHeight;
            });
    }

    function appendPromptEcho(command) {
        var short = shortenHome(cwd);
        appendHtml('<span class="prompt-line"><span class="prompt-user">ec2-user@server</span>:'
            + '<span class="prompt-path">' + escapeHtml(short) + '</span>$ '
            + '<span class="cmd-text">' + escapeHtml(command) + '</span></span>\n');
    }

    function appendHtml(html) {
        term.insertAdjacentHTML('beforeend', html);
        term.scrollTop = term.scrollHeight;
    }

    function clearScreen() {
        term.innerHTML = '';
        refreshPrompt();
        input.focus();
    }

    window.clearScreen = clearScreen;

    function escapeHtml(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }
})();
</script>
</body>
</html>
