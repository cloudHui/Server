<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏大厅</title>
    <script src="../../shared/app-base.js"></script>
    <style>
        :root { --blue:#409eff; --ink:#303133; --muted:#909399; --line:#ebeef5; --page:#f5f7fa; }
        * { box-sizing:border-box; }
        body { margin:0; min-height:100vh; font-family:"Microsoft YaHei",Arial,sans-serif; color:var(--ink); background:var(--page); }
        header { height:60px; padding:0 28px; display:flex; align-items:center; justify-content:space-between; color:#fff; background:#304156; box-shadow:0 1px 4px #c5c8cc; }
        h1 { margin:0; font-size:20px; letter-spacing:1px; }
        .user-actions { display:flex; align-items:center; gap:12px; font-size:13px; }
        .header-btn { border:0; color:#dfe8f3; background:transparent; text-decoration:none; cursor:pointer; }
        main { max-width:1180px; margin:0 auto; padding:24px 28px 48px; }
        .breadcrumb { margin:0 0 18px; color:var(--muted); font-size:13px; }
        .welcome { display:flex; align-items:center; justify-content:space-between; gap:20px; margin-bottom:20px; }
        .welcome h2 { margin:0 0 6px; font-size:22px; font-weight:500; }
        .welcome p { margin:0; color:var(--muted); font-size:13px; }
        .admin-link { color:var(--blue); text-decoration:none; font-size:13px; }
        .game-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:18px; }
        .game-card { position:relative; min-height:218px; padding:22px; display:flex; flex-direction:column; justify-content:space-between; overflow:hidden; border:1px solid var(--line); border-radius:4px; background:#fff; box-shadow:0 2px 8px rgba(0,0,0,.04); }
        .game-card:before { content:""; position:absolute; left:0; top:0; right:0; height:3px; background:var(--card-color); }
        .game-card h3 { margin:0 0 10px; font-size:19px; font-weight:500; }
        .game-card p { margin:0; color:#606266; line-height:1.7; font-size:13px; }
        .game-icon { width:48px; height:48px; display:grid; place-items:center; margin-bottom:16px; border-radius:8px; color:#fff; background:var(--card-color); font-size:25px; }
        .game-btn { display:block; padding:10px 14px; border-radius:3px; color:#fff; background:var(--card-color); text-align:center; text-decoration:none; font-size:14px; }
        .ddz { --card-color:#f56c6c; } .mj { --card-color:#409eff; } .mini { --card-color:#67c23a; }
        .quick-panel { margin-top:18px; padding:18px 20px; border:1px solid var(--line); border-radius:4px; background:#fff; }
        .quick-panel h3 { margin:0 0 8px; font-size:15px; font-weight:500; }
        .quick-panel p { margin:0; color:var(--muted); font-size:13px; }
        @media (max-width:800px) { header{padding:0 16px;} main{padding:18px 16px 34px;} .game-grid{grid-template-columns:1fr;} .game-card{min-height:178px;} .welcome{align-items:flex-start; flex-direction:column; gap:10px;} }
        @media (max-width:420px) { header{height:54px;} h1{font-size:17px;} .user-actions{gap:7px;} .user-actions span{max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;} }
    </style>
</head>
<body>
<header>
    <h1>游戏大厅</h1>
    <div class="user-actions">
        <span id="userDisplay"></span>
        <a class="header-btn" href="../../pages/admin/replays.html">我的回放</a>
        <button class="header-btn" onclick="logout()">退出</button>
    </div>
</header>
<main>
    <p class="breadcrumb">首页 / 游戏大厅</p>
    <div class="welcome"><div><h2>欢迎回来，<span id="welcomeName">玩家</span></h2><p>请选择一个游戏模块开始，进入模块后才加载房间和牌局数据。</p></div><a class="admin-link" href="../../pages/admin/admin.html" id="adminLink" style="display:none">管理后台 →</a></div>
    <section class="game-grid">
        <article class="game-card ddz">
            <div><div class="game-icon">🃏</div><h3>斗地主</h3><p>经典三人玩法，进入后查看房间并选择牌桌。</p></div>
            <a class="game-btn ddz" href="../../pages/home/doudizhu-rooms.html">进入斗地主</a>
        </article>
        <article class="game-card mj">
            <div><div class="game-icon">🀄</div><h3>麻将</h3><p>进入麻将专区后再加载麻将房间和桌子。</p></div>
            <a class="game-btn mj" href="../../pages/home/mahjong-rooms.html">进入麻将</a>
        </article>
        <article class="game-card mini">
            <div><div class="game-icon">🎮</div><h3>休闲小游戏</h3><p>五子棋、中国象棋、坦克大战等本地或联机小游戏。</p></div>
            <a class="game-btn mini" href="../../pages/mini/mini-games.html">查看小游戏</a>
        </article>
    </section>
    <section class="quick-panel"><h3>使用提示</h3><p>手机端按模块进入即可，桌子列表不会在大厅首页提前请求；电脑端同样使用响应式卡片布局。</p></section>
</main>
<script>
    // 首页只读取登录态，不触发任何房间接口；具体游戏页负责自己的数据加载。
    var sessionId = localStorage.getItem('sessionId');
    if (!sessionId) window.location.href = appUrl('/');
    var displayName = localStorage.getItem('nickname') || localStorage.getItem('username') || '玩家';
    document.getElementById('userDisplay').textContent = displayName;
    document.getElementById('welcomeName').textContent = displayName;
    if (localStorage.getItem('isAdmin') === '1') document.getElementById('adminLink').style.display = 'inline';
    function logout() {
        fetch(appUrl('/api/logout'), { method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({sessionId: sessionId}) }).catch(function () {});
        localStorage.clear();
        window.location.href = appUrl('/');
    }
</script>
</body>
</html>
