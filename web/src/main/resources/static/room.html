<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏大厅</title>
    <script src="app-base.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; font-family: "Microsoft YaHei", sans-serif; color: #24352a;
            background: radial-gradient(circle at 15% 0%, rgba(255,215,0,.16), transparent 38%), #123522; }
        header { padding: 18px 28px; display: flex; justify-content: space-between; align-items: center;
            color: #fff; background: rgba(0,0,0,.25); }
        h1 { margin: 0; color: #ffd700; font-size: 24px; }
        .user-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .header-btn { padding: 7px 13px; border: 1px solid rgba(255,255,255,.35); border-radius: 7px;
            color: #fff; background: rgba(255,255,255,.12); text-decoration: none; cursor: pointer; }
        main { max-width: 980px; margin: 34px auto; padding: 0 20px 50px; }
        .intro { margin-bottom: 22px; color: rgba(255,255,255,.78); }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 18px; }
        .game-card { padding: 24px; min-height: 220px; display: flex; flex-direction: column; justify-content: space-between;
            border-radius: 16px; background: rgba(255,252,245,.97); box-shadow: 0 8px 28px rgba(0,0,0,.24); }
        .game-card h2 { margin: 0 0 8px; font-size: 23px; }
        .game-card p { margin: 0; color: #647067; line-height: 1.7; }
        .game-icon { font-size: 48px; margin-bottom: 12px; }
        .game-btn { display: block; padding: 11px 16px; border-radius: 9px; color: white; text-align: center;
            text-decoration: none; font-size: 15px; }
        .ddz { background: linear-gradient(135deg, #b71c1c, #ef5350); }
        .mj { background: linear-gradient(135deg, #1565c0, #42a5f5); }
        .mini { background: linear-gradient(135deg, #5d4037, #8d6e63); }
        .links { margin-top: 20px; display: flex; gap: 14px; flex-wrap: wrap; }
        .links a { color: #ffd700; }
        @media (max-width: 600px) { header { padding: 14px 16px; } h1 { font-size: 20px; } main { margin-top: 22px; } }
    </style>
</head>
<body>
<header>
    <h1>牌友大厅</h1>
    <div class="user-actions">
        <span id="userDisplay"></span>
        <a class="header-btn" href="replays.html">我的回放</a>
        <button class="header-btn" onclick="logout()">退出</button>
    </div>
</header>
<main>
    <p class="intro">选择游戏后进入对应页面。房间数据只在打开具体游戏时加载，首页不会提前请求大厅服务。</p>
    <section class="game-grid">
        <article class="game-card">
            <div><div class="game-icon">🃏</div><h2>斗地主</h2><p>经典三人玩法，进入后查看房间并选择牌桌。</p></div>
            <a class="game-btn ddz" href="doudizhu-rooms.html">进入斗地主</a>
        </article>
        <article class="game-card">
            <div><div class="game-icon">🀄</div><h2>麻将</h2><p>进入麻将专区后再加载麻将房间和桌子。</p></div>
            <a class="game-btn mj" href="mahjong-rooms.html">进入麻将</a>
        </article>
        <article class="game-card">
            <div><div class="game-icon">🎮</div><h2>休闲小游戏</h2><p>五子棋、中国象棋、坦克大战等本地或联机小游戏。</p></div>
            <a class="game-btn mini" href="mini-games.html">查看小游戏</a>
        </article>
    </section>
    <div class="links"><a href="admin.html" id="adminLink" style="display:none">管理后台</a></div>
</main>
<script>
    // 首页只读取登录态，不触发任何房间接口；具体游戏页负责自己的数据加载。
    var sessionId = localStorage.getItem('sessionId');
    if (!sessionId) window.location.href = appUrl('/');
    document.getElementById('userDisplay').textContent = localStorage.getItem('nickname') || localStorage.getItem('username') || '玩家';
    if (localStorage.getItem('isAdmin') === '1') document.getElementById('adminLink').style.display = 'inline';
    function logout() {
        fetch(appUrl('/api/logout'), { method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({sessionId: sessionId}) }).catch(function () {});
        localStorage.clear();
        window.location.href = appUrl('/');
    }
</script>
</body>
</html>
