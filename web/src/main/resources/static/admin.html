<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邀请管理</title>
    <style>
        :root {
            --bg0: #101820;
            --bg1: #1c2b36;
            --accent: #c9a227;
            --card: #f7f4ee;
            --ink: #1c2430;
            --muted: #6b7280;
            --ok: #1f6b45;
            --bad: #b33a3a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            background:
                radial-gradient(ellipse at top right, rgba(201,162,39,0.12), transparent 40%),
                linear-gradient(165deg, var(--bg0), var(--bg1));
            color: var(--ink);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 28px;
            background: rgba(0,0,0,0.28);
            color: #f5f0e6;
        }
        .header h1 { font-size: 20px; color: var(--accent); letter-spacing: 0.06em; }
        .header a, .header button {
            color: #f5f0e6;
            text-decoration: none;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 7px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            margin-left: 8px;
        }
        .wrap {
            max-width: 960px;
            margin: 28px auto;
            padding: 0 20px 40px;
        }
        .card {
            background: var(--card);
            border-radius: 14px;
            padding: 22px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.22);
        }
        .card h2 {
            font-size: 16px;
            margin-bottom: 14px;
            color: #243447;
        }
        .form-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 10px;
            align-items: end;
        }
        label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d8d2c6;
            border-radius: 8px;
            font-size: 14px;
            background: #fff;
        }
        .btn {
            border: none;
            background: #1f5c36;
            color: #fff;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }
        .btn:hover { filter: brightness(1.06); }
        .btn-ghost {
            background: transparent;
            color: #334;
            border: 1px solid #cfc7b8;
        }
        .btn-danger {
            background: #9e3535;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th, td {
            text-align: left;
            padding: 10px 8px;
            border-bottom: 1px solid #e6e0d4;
            vertical-align: middle;
        }
        th { color: var(--muted); font-weight: 600; font-size: 12px; }
        .token {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 12px;
            word-break: break-all;
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 11px;
        }
        .badge-ok { background: #e5f5ec; color: var(--ok); }
        .badge-bad { background: #f8e8e8; color: var(--bad); }
        .actions button { margin-right: 6px; margin-top: 4px; }
        .msg {
            margin-top: 10px;
            font-size: 13px;
            color: var(--muted);
            min-height: 18px;
        }
        .msg.err { color: var(--bad); }
        .msg.ok { color: var(--ok); }
        @media (max-width: 720px) {
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>邀请管理</h1>
        <div>
            <a href="/room.html">回大厅</a>
            <button onclick="doLogout()">退出</button>
        </div>
    </div>

    <div class="wrap">
        <div class="card">
            <h2>创建邀请码</h2>
            <div class="form-row">
                <div>
                    <label>备注</label>
                    <input id="note" placeholder="例如：朋友局">
                </div>
                <div>
                    <label>可用次数</label>
                    <input id="maxUses" type="number" min="1" value="5">
                </div>
                <div>
                    <label>有效天数</label>
                    <input id="expiresDays" type="number" min="0" value="7">
                </div>
                <button class="btn" onclick="createInvite()">创建</button>
            </div>
            <div class="msg" id="createMsg"></div>
        </div>

        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                <h2 style="margin:0;">邀请列表</h2>
                <button class="btn btn-ghost" onclick="loadInvites()">刷新</button>
            </div>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>邀请码</th>
                            <th>备注</th>
                            <th>使用</th>
                            <th>过期</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="inviteBody">
                        <tr><td colspan="6">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="msg" id="listMsg"></div>
        </div>
    </div>

    <script>
        var sessionId = localStorage.getItem('sessionId');
        var isAdmin = localStorage.getItem('isAdmin') === '1';
        if (!sessionId) { window.location.href = '/'; }
        if (!isAdmin) {
            alert('需要管理员账号');
            window.location.href = '/room.html';
        }

        function setMsg(id, text, ok) {
            var el = document.getElementById(id);
            el.textContent = text || '';
            el.className = 'msg' + (ok === true ? ' ok' : ok === false ? ' err' : '');
        }

        function createInvite() {
            var note = document.getElementById('note').value.trim();
            var maxUses = parseInt(document.getElementById('maxUses').value, 10) || 1;
            var expiresDays = parseInt(document.getElementById('expiresDays').value, 10);
            if (isNaN(expiresDays)) expiresDays = 7;
            setMsg('createMsg', '创建中...');
            fetch('/api/admin/invites', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    sessionId: sessionId,
                    note: note,
                    maxUses: maxUses,
                    expiresDays: expiresDays
                })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.code === 0 && data.invite) {
                    setMsg('createMsg', '已创建: ' + data.invite.token, true);
                    document.getElementById('note').value = '';
                    loadInvites();
                } else {
                    setMsg('createMsg', data.msg || '创建失败', false);
                }
            })
            .catch(function() { setMsg('createMsg', '网络错误', false); });
        }

        function loadInvites() {
            fetch('/api/admin/invites?sessionId=' + encodeURIComponent(sessionId))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.code === 403) {
                        alert('需要管理员');
                        window.location.href = '/room.html';
                        return;
                    }
                    if (data.code !== 0) {
                        setMsg('listMsg', data.msg || '加载失败', false);
                        return;
                    }
                    renderInvites(data.invites || []);
                    setMsg('listMsg', '');
                })
                .catch(function() { setMsg('listMsg', '网络错误', false); });
        }

        function renderInvites(list) {
            var body = document.getElementById('inviteBody');
            if (!list.length) {
                body.innerHTML = '<tr><td colspan="6">暂无邀请码</td></tr>';
                return;
            }
            var html = '';
            for (var i = 0; i < list.length; i++) {
                var inv = list[i];
                var exp = inv.expiresAt ? new Date(inv.expiresAt).toLocaleString() : '永久';
                var valid = inv.valid;
                html += '<tr>';
                html += '<td class="token">' + escapeHtml(inv.token) + '</td>';
                html += '<td>' + escapeHtml(inv.note || '') + '</td>';
                html += '<td>' + inv.usedCount + ' / ' + inv.maxUses + '</td>';
                html += '<td>' + escapeHtml(exp) + '</td>';
                html += '<td><span class="badge ' + (valid ? 'badge-ok' : 'badge-bad') + '">' +
                    (valid ? '有效' : '无效') + '</span></td>';
                html += '<td class="actions">';
                html += '<button class="btn btn-ghost" onclick="copyLink(\'' + inv.token + '\')">复制链接</button>';
                if (inv.enabled) {
                    html += '<button class="btn btn-danger" onclick="revoke(\'' + inv.token + '\')">作废</button>';
                }
                html += '</td></tr>';
            }
            body.innerHTML = html;
        }

        function copyLink(token) {
            var link = location.origin + '/?invite=' + encodeURIComponent(token);
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(link).then(function() {
                    setMsg('listMsg', '已复制: ' + link, true);
                });
            } else {
                prompt('复制邀请链接', link);
            }
        }

        function revoke(token) {
            if (!confirm('确定作废该邀请码？')) return;
            fetch('/api/admin/invites/revoke', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId: sessionId, token: token })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.code === 0) {
                    setMsg('listMsg', '已作废', true);
                    loadInvites();
                } else {
                    setMsg('listMsg', data.msg || '作废失败', false);
                }
            })
            .catch(function() { setMsg('listMsg', '网络错误', false); });
        }

        function doLogout() {
            fetch('/api/logout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId: sessionId })
            }).catch(function() {});
            localStorage.clear();
            window.location.href = '/';
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, function(c) {
                return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
            });
        }

        loadInvites();
    </script>
</body>
</html>
