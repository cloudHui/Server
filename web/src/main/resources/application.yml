server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: web

gate:
  host: 127.0.0.1
  port: 5600

lobby:
  admin-http: http://127.0.0.1:5701

game:
  # 相对 web 启动目录；若从 repos/Server 起服可用此路径
  replay-dir: build/game/replay

logging:
  file:
    name: ./logs/web/app.log
  logback:
    rollingpolicy:
      max-file-size: 30MB
      file-name-pattern: ./logs/web/archived/app-%d{yyyy-MM-dd-HH}.%i.log.gz
      max-history: 168
      total-size-cap: 2GB
  pattern:
    file: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    web: INFO
