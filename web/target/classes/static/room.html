<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>斗地主 - 大厅</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #2d5a27 50%, #1a472a 100%);
            min-height: 100vh;
        }
        .header {
            background: rgba(0,0,0,0.3);
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        .header h1 { font-size: 24px; color: #ffd700; }
        .user-info { display: flex; align-items: center; gap: 16px; }
        .user-info span { font-size: 14px; }
        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.3); }

        .content {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .section-title {
            color: #ffd700;
            font-size: 20px;
            margin-bottom: 16px;
            padding-left: 8px;
            border-left: 4px solid #ffd700;
        }
        .room-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .room-card {
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .room-card h3 {
            color: #333;
            margin-bottom: 12px;
            font-size: 18px;
        }
        .table-list {
            margin-top: 10px;
        }
        .table-item {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .table-item .info {
            font-size: 13px;
            color: #555;
        }
        .table-item .status {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 12px;
        }
        .status-waiting { background: #e8f5e9; color: #2e7d32; }
        .status-playing { background: #fff3e0; color: #e65100; }

        .join-btn {
            background: linear-gradient(135deg, #c41e2a, #e63946);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            margin-top: 12px;
            width: 100%;
            transition: transform 0.2s;
        }
        .join-btn:hover { transform: translateY(-2px); }
        .join-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        .empty-tip {
            text-align: center;
            color: rgba(255,255,255,0.7);
            padding: 60px 20px;
            font-size: 16px;
        }
        .refresh-btn {
            background: rgba(255,215,0,0.2);
            border: 1px solid rgba(255,215,0,0.5);
            color: #ffd700;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .refresh-btn:hover { background: rgba(255,215,0,0.3); }
        .loading { text-align: center; color: rgba(255,255,255,0.7); padding: 40px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>斗地主大厅</h1>
        <div class="user-info">
            <span id="userDisplay"></span>
            <button class="logout-btn" onclick="doLogout()">退出</button>
        </div>
    </div>

    <div class="content">
        <button class="refresh-btn" onclick="loadRooms()">刷新房间</button>
        <h2 class="section-title">房间列表</h2>
        <div id="roomList" class="room-list">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        var sessionId = localStorage.getItem('sessionId');
        var nickname = localStorage.getItem('nickname');

        // 未登录跳转
        if (!sessionId) {
            window.location.href = '/';
        }

        document.getElementById('userDisplay').textContent = '玩家: ' + (nickname || '未知');

        function loadRooms() {
            document.getElementById('roomList').innerHTML = '<div class="loading">加载中...</div>';

            fetch('/api/rooms?sessionId=' + encodeURIComponent(sessionId))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.code === 401) {
                        window.location.href = '/';
                        return;
                    }
                    if (data.code !== 0) {
                        document.getElementById('roomList').innerHTML =
                            '<div class="empty-tip">' + (data.msg || '加载失败') + '</div>';
                        return;
                    }
                    renderRooms(data.rooms || []);
                })
                .catch(function(err) {
                    document.getElementById('roomList').innerHTML =
                        '<div class="empty-tip">网络错误，请重试</div>';
                });
        }

        function renderRooms(rooms) {
            var container = document.getElementById('roomList');
            if (rooms.length === 0) {
                container.innerHTML = '<div class="empty-tip">暂无房间，点击"加入"创建新牌局</div>';
                // 添加一个默认房间按钮
                container.innerHTML += '<div style="text-align:center;margin-top:20px;">' +
                    '<button class="join-btn" style="width:auto;padding:12px 40px;" onclick="joinRoom(1)">创建/加入经典场</button></div>';
                return;
            }

            var html = '';
            for (var i = 0; i < rooms.length; i++) {
                var room = rooms[i];
                html += '<div class="room-card">';
                html += '<h3>房间 #' + room.roomId + '</h3>';

                if (room.tables && room.tables.length > 0) {
                    html += '<div class="table-list">';
                    for (var j = 0; j < room.tables.length; j++) {
                        var table = room.tables[j];
                        var statusClass = table.stat === 0 ? 'status-waiting' : 'status-playing';
                        var statusText = table.stat === 0 ? '等待中' : '游戏中';
                        var playerNames = [];
                        if (table.players) {
                            for (var k = 0; k < table.players.length; k++) {
                                playerNames.push(table.players[k].nickName || ('玩家' + table.players[k].roleId));
                            }
                        }
                        html += '<div class="table-item">';
                        html += '<div class="info">桌号 ' + table.tableId + ' | ' +
                            (playerNames.length > 0 ? playerNames.join(', ') : '空桌') +
                            ' (' + table.playerCount + '/3)</div>';
                        html += '<span class="status ' + statusClass + '">' + statusText + '</span>';
                        html += '</div>';
                    }
                    html += '</div>';
                }

                html += '<button class="join-btn" onclick="joinRoom(' + room.roomId + ')">加入房间</button>';
                html += '</div>';
            }
            container.innerHTML = html;
        }

        function joinRoom(roomId) {
            fetch('/api/rooms/join', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId: sessionId, roomId: roomId })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.code === 0) {
                    localStorage.setItem('tableId', data.tableId);
                    localStorage.setItem('roomId', roomId);
                    window.location.href = '/game.html';
                } else {
                    alert(data.msg || '加入房间失败');
                }
            })
            .catch(function(err) {
                alert('网络错误，请重试');
            });
        }

        function doLogout() {
            fetch('/api/logout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId: sessionId })
            }).catch(function() {});
            localStorage.clear();
            window.location.href = '/';
        }

        // 初始加载
        loadRooms();

        // 每10秒自动刷新
        setInterval(loadRooms, 10000);
    </script>
</body>
</html>
