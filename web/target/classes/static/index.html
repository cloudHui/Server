<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>斗地主 - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #2d5a27 50%, #1a472a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 40px;
            width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .login-box h1 {
            color: #c41e2a;
            font-size: 32px;
            margin-bottom: 8px;
        }
        .login-box .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .login-box input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            margin-bottom: 20px;
        }
        .login-box input:focus {
            border-color: #c41e2a;
        }
        .login-box button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #c41e2a, #e63946);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .login-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(196,30,42,0.4);
        }
        .login-box button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .error-msg {
            color: #e63946;
            margin-top: 12px;
            font-size: 14px;
            min-height: 20px;
        }
        .saved-info {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>斗地主</h1>
        <p class="subtitle">经典三人棋牌对战</p>
        <div id="savedInfo" class="saved-info" style="display:none;">
            欢迎回来, <span id="savedNick"></span>!
        </div>
        <input type="text" id="nickname" placeholder="请输入昵称" maxlength="12" autofocus>
        <button id="loginBtn" onclick="doLogin()">进入游戏</button>
        <div class="error-msg" id="errorMsg"></div>
    </div>

    <script>
        // 检查是否有保存的Token
        window.onload = function() {
            var token = localStorage.getItem('token');
            var nickname = localStorage.getItem('nickname');
            if (token && nickname) {
                document.getElementById('savedInfo').style.display = 'block';
                document.getElementById('savedNick').textContent = nickname;
                document.getElementById('nickname').value = nickname;
                // 自动验证Token
                validateToken(token);
            }
        };

        function validateToken(token) {
            fetch('/api/validate?token=' + encodeURIComponent(token))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.code === 0) {
                        localStorage.setItem('sessionId', data.sessionId);
                        localStorage.setItem('userId', data.userId);
                        localStorage.setItem('nickname', data.nickname);
                        localStorage.setItem('token', data.token);
                        window.location.href = '/room.html';
                    }
                })
                .catch(function(err) { console.log('Token验证失败', err); });
        }

        function doLogin() {
            var nickname = document.getElementById('nickname').value.trim();
            if (!nickname) {
                document.getElementById('errorMsg').textContent = '请输入昵称';
                return;
            }

            var btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = '登录中...';
            document.getElementById('errorMsg').textContent = '';

            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nickname: nickname })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.code === 0) {
                    localStorage.setItem('sessionId', data.sessionId);
                    localStorage.setItem('userId', data.userId);
                    localStorage.setItem('nickname', data.nickname);
                    localStorage.setItem('token', data.token);
                    window.location.href = '/room.html';
                } else {
                    document.getElementById('errorMsg').textContent = data.msg || '登录失败';
                    btn.disabled = false;
                    btn.textContent = '进入游戏';
                }
            })
            .catch(function(err) {
                document.getElementById('errorMsg').textContent = '网络错误，请重试';
                btn.disabled = false;
                btn.textContent = '进入游戏';
            });
        }

        // 回车登录
        document.getElementById('nickname').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') doLogin();
        });
    </script>
</body>
</html>
