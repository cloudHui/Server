syntax = "proto3";
option java_outer_classname = "HallProto";

package proto;

import "model.proto";

//请求登录
message ReqLogin {
    bytes cert = 1; //证书(设备ID)
    bytes nickName = 2; //昵称
    bytes avatar = 3; //头像信息
    int32 channel = 4;//渠道号
    bytes token = 5;//认证token(首次登录为空)
    int32 loginType = 6;//登录类型: 0=游客(设备ID), 1=账号密码
    bytes loginKey = 7;//登录密钥(游客为空, 账号密码登录时为密码)
}

message AckLogin {
    bytes cert = 1;//证书(设备ID)
    int32 userId = 2;//用户id
    bytes nickName = 3;//昵称
    int32 channel = 4;//渠道号
    int32 club = 5;//工会
    repeated int64 tables = 6;//加入的房间(重连回去的)
    repeated Room roomList = 7;
    bytes token = 8;//认证token
}


message ReqJoinClub{
    int32 clubId = 1;
}

message AckJoinClub{
    Club joinClub = 1;
}
message Club{
    int32 clubId = 1;
    bytes avatar = 2; //头像信息
    bytes name = 3; //名称
    bytes des = 4; //宣言
    repeated ClubMember members = 5;//成员
}
message ClubMember{
    int32 roleId = 1;
    int32 position = 2;
}
