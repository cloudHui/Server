syntax = "proto3";
option java_outer_classname = "GameProto";

package proto;

import "const.proto";

//请求加入桌子
message ReqEnterTable {
    int64 table_id = 1;
    bytes head = 2;
    bytes nick = 3;
}

//加入桌子回复
message AckEnterTable {
    repeated Player players = 1;
    TableInfo tableInfo = 2;
}

//请求离开桌子
message ReqLeaveTable {
    bytes tableId = 1;
}

//离开桌子回复
message AckLeaveTable {
    repeated Player players = 1;
    TableInfo tableInfo = 2;
}

//发牌
message NotCard{
    repeated NCardsInfo nCards = 1;
}

//通知操作
message NotOperation{
    int32 wait = 1;//操作等待时间
    int32 opSeat = 2;//操作玩家位置
    repeated OpInfo choice = 3;//选择 叫地主
}

//通知桌子状态
message NotTableState{
    int32 state = 1;//桌子状态
    int64 stateStart = 2;//状态开始时间
    int32 stateDuration = 3;//状态持续时间(s)
}

//请求操作
message ReqOp {
    OpInfo op = 1;
}

//操作回复
message AckOp {
    OpInfo op = 1;
    int32 opId = 2;//操作玩家id
    int32 opFrom = 3;//来源id
}

//通知结果
message NotResult{
    int32 winner = 1;
    repeated RPlayer rPlayers = 2;
    int32 landlord_id = 3;//地主 roleId
    int32 win_team = 4;//0 地主胜 1 农民胜
    int32 base_score = 5;//叫分 1-3
    int32 rob_multiplier = 6;//抢地主倍数(每抢一次×2，底数1)
    bool spring = 7;//春天：地主胜且农民未出过牌
    bool anti_spring = 8;//反春：农民胜且地主只出过一手牌
    int32 settle_factor = 9;//示意：base_score*rob_multiplier*春天/反春加倍后的系数，具体结算客户端可按规则拆
}

message OpInfo{
    Operation choice = 1;
    repeated CardInfo opCards = 2;
}

message TableInfo{
    int32 roomId = 1;
    int64 tableId = 2;
    int32 landlord = 3;
    CardInfo lastCard = 4;//上一次出的牌
}

message Player{
    int32 roleId = 1;
    int32 position = 2;
    bytes avatar = 3;
    bytes nickName = 4;
    repeated Card cards = 5;
}

//结果玩家
message RPlayer{
    int32 roleId = 1;
    repeated Card cards = 5;
}

message CardInfo{
    repeated Card cards = 1;
    CardType type = 2;
}
message Card{
    int32 value = 1;
    int32 replace = 2;
}

message NCardsInfo{
    int32 roleId = 1;
    repeated Card cards = 2;//自己才有值其他人的牌都是牌值都是0
}

//麻将状态通知
message NotMjState{
    int32 opSeat = 1;//操作座位
    int32 tileId = 2;//相关牌ID
    Operation action = 3;//动作类型(使用Operation枚举: DRAW/DISCARD/MJ_PENG/MJ_GANG/MJ_CHI/MJ_HU/MJ_PASS)
    int32 wait = 4;//等待时间(秒)
    repeated OpInfo choice = 5;//可选操作
    int32 wallLeft = 6;//牌墙剩余
}

//单局结算通知
message NotRoundResult{
    int32 round = 1;//第几局
    int32 winnerSeat = 2;//胡牌座位(-1=流局)
    int32 fan = 3;//番数
    repeated SeatScore seatScores = 4;//每家得分
    bytes winType = 5;//胡牌方式
    repeated SeatExposed seatExposed = 6;//每家副露统计
    repeated HandInfo hands = 7;//每家手牌(结算展示用)
    int32 winTile = 8;//胡的那张牌
}

//玩家手牌信息(结算用)
message HandInfo{
    int32 seat = 1;
    repeated int32 handTiles = 2;//手牌ID列表
    repeated ExposedInfo exposed = 3;//副露区
}

//座位得分
message SeatScore{
    int32 seat = 1;
    int32 score = 2;
}

//座位副露统计
message SeatExposed{
    int32 seat = 1;
    repeated ExposedInfo exposed = 2;
}

//单条副露信息
message ExposedInfo{
    bytes type = 1;//peng/chi/mingGang/anGang/buGang
    repeated int32 tileIds = 2;
}

//总结算通知
message NotGameResult{
    int32 totalRounds = 1;
    int32 completedRounds = 2;
    repeated SeatScore totalScores = 3;//每家总分
    repeated RoundSummary rounds = 4;//每局摘要
}

//单局摘要
message RoundSummary{
    int32 round = 1;
    int32 winnerSeat = 2;
    int32 fan = 3;
    bytes winType = 4;
    repeated SeatScore seatScores = 5;
}
