syntax = "proto3";
option java_outer_classname = "ServerProto";

package proto;

import "model.proto";

// 请求创建 game 桌子
message ReqCreateGameTable {
    int32 roomId = 1;
    RoomRole roomRole = 2;
}

message AckCreateGameTable {
    RoomTableInfo tables = 2;
}

// 心跳
message ReqHeart {
    int32 serverType = 1;
    int32 serverId = 2;
    int64 reqTime = 3;
}
message AckHeart {
    int32 serverId = 1;
    int64 reqTime = 2;
}

// 服务在路由注册信息
message ReqRegister {
    ServerInfo serverInfo = 1;
}
message AckRegister {
    ServerInfo serverInfo = 1;
}

// 服务变更通知
message NotRegisterInfo {
    repeated ServerInfo servers = 1;
}

// client 链接通知
message NotRegisterClient {
    bytes cert = 1;
    bytes gate = 2;
}

// 获取服务信息
message ReqServerInfo {
    repeated int32 serverType = 1;
}
message AckServerInfo {
    repeated ServerInfo servers = 1;
}

// 通知服务掉线
message NotServerBreak {
    repeated ServerInfo servers = 1;
}

// 通知玩家掉线
message NotBreak {
    int32 userId = 1;
    bytes cert = 2;
    int32 gateClientId = 3; // gate 上该玩家连接 id；用于忽略被顶号后的旧连接断线
}

// Lobby 向 Game 请求桌子列表(重启恢复用)
message ReqRoomTables {
    int32 roomServerId = 1;
}

message AckRoomTables {
    repeated RoomTableInfo tables = 1;
}

// Game 通知 Lobby 桌子销毁
message NotTableDestroyed {
    int64 tableId = 1;
}

// Game 通知 Lobby 玩家离桌（等待阶段退桌，桌子仍保留）
message NotTablePlayerLeft {
    int64 tableId = 1;
    int32 roleId = 2;
}
